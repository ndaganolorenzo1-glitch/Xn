version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: instagram-growth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: instagram_growth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: instagram-growth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: instagram-growth-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/instagram_growth
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: .
    container_name: instagram-growth-worker
    command: celery -A app.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/instagram_growth
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - .:/app

  celery_beat:
    build: .
    container_name: instagram-growth-beat
    command: celery -A app.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/instagram_growth
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: instagram-growth-network
